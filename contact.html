<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Us — ShopFlow</title>

  <script src="https://assets.adobedtm.com/18d6771123cb/9d967cb3ad8c/launch-38c5a1a5e1b9.min.js" async></script>

  <script>
    window.digitalData = {
      page: {
        pageInfo: {
          pageName: "shopflow:contact_us",
          siteSection: "corporate_relations",
          server: "production"
        }
      }
    };

    function adobeTrack(event, data) {
      window.digitalData = Object.assign(window.digitalData, data || {});
      if (window._satellite && typeof window._satellite.track === 'function') {
        window._satellite.track(event, data);
      }
    }
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --ink: #1A1A1A; --ink-muted: #6B6B6B; --surface: #FFFFFF; --surface-off: #F7F5F2;
      --border: #E2DED9; --accent: #2C5282; --accent-hover: #1A3A5C;
      --radius-sm: 6px; --radius-md: 10px; --radius-lg: 16px;
      --font-display: 'Playfair Display', serif; --font-body: 'Inter', sans-serif;
      --nav-h: 64px; --trans: 0.22s cubic-bezier(0.4,0,0.2,1);
    }
    body { font-family: var(--font-body); background: var(--surface-off); color: var(--ink); padding-top: var(--nav-h); }
    
    /* Layout Core Design Structure */
    .nav { position: fixed; top: 0; left: 0; right: 0; z-index: 900; height: var(--nav-h); background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 2rem; }
    .nav-brand { font-family: var(--font-display); font-size: 1.35rem; font-weight: 600; color: var(--ink); text-decoration: none; margin-right: 2.5rem; }
    .nav-brand span { color: var(--accent); }
    .nav-tabs { display: flex; height: var(--nav-h); }
    .nav-tab { padding: 0 1.25rem; display: flex; align-items: center; font-size: 0.875rem; font-weight: 500; color: var(--ink-muted); text-decoration: none; border-bottom: 2.5px solid transparent; }
    .nav-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    .container { max-width: 600px; margin: 4rem auto; padding: 0 1.5rem; }
    .form-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 2.5rem; box-shadow: 0 4px 16px rgba(0,0,0,0.02); }
    .page-title { font-family: var(--font-display); font-size: 2rem; margin-bottom: 0.5rem; }
    .page-sub { color: var(--ink-muted); font-size: 0.95rem; margin-bottom: 2rem; }
    
    .form-group { display: flex; flex-direction: column; gap: 0.4rem; margin-bottom: 1.25rem; }
    .form-label { font-size: 0.78rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--ink-muted); }
    .form-input, .form-textarea { padding: 0.75rem 1rem; border: 1.5px solid var(--border); border-radius: var(--radius-sm); font-family: var(--font-body); font-size: 0.9rem; outline: none; transition: border-color var(--trans); }
    .form-input:focus, .form-textarea:focus { border-color: var(--accent); }
    .form-textarea { min-height: 120px; resize: vertical; }
    
    .btn-submit { background: var(--accent); color: #fff; border: none; border-radius: var(--radius-md); padding: 1rem; font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: background var(--trans); }
    .btn-submit:hover { background: var(--accent-hover); }
    .success-msg { display: none; background: #EAF5EF; color: #276749; padding: 1rem; border-radius: var(--radius-sm); text-align: center; font-size: 0.9rem; font-weight: 500; margin-top: 1rem; }
  </style>
  <script src="https://assets.adobedtm.com/18d6771123cb/9d967cb3ad8c/launch-38c5a1a5e1b9.min.js" async></script>
</head>
<body>

  <nav class="nav">
    <a class="nav-brand" href="index.html">Shop<span>Flow</span></a>
    <div class="nav-tabs">
      <a class="nav-tab" href="index.html">Home</a>
      <a class="nav-tab" href="shop.html">Shop</a>
      <a class="nav-tab" href="about.html">About</a>
      <a class="nav-tab active" href="contact.html">Contact</a>
    </div>
  </nav>

  <div class="container">
    <div class="form-card">
      <h1 class="page-title">Get in Touch</h1>
      <p class="page-sub">Have queries about a piece? Our interior experts respond within 24 hours.</p>
      
      <form id="contactForm" onsubmit="handleContactSubmit(event)">
        <div class="form-group">
          <label class="form-label">Full Name</label>
          <input type="text" id="contactName" class="form-input" required placeholder="Siddharth Malhotra" />
        </div>
        <div class="form-group">
          <label class="form-label">Email Identity</label>
          <input type="email" id="contactEmail" class="form-input" required placeholder="sid@example.com" />
        </div>
        <div class="form-group">
          <label class="form-label">Message Narrative</label>
          <textarea id="contactMessage" class="form-textarea" required placeholder="Inquire about dimensions or material updates..."></textarea>
        </div>
        <button type="submit" class="btn-submit">Dispatch Message</button>
      </form>
      <div id="submissionSuccess" class="success-msg">✉ Narrative received securely. Our concierges are reviewing.</div>
    </div>
  </div>

  <script>
    function handleContactSubmit(e) {
      e.preventDefault();
      
      const identity = document.getElementById('contactName').value;
      const contextEmail = document.getElementById('contactEmail').value;
      
      // Execute Analytics Event Dispatch
      adobeTrack('lead_generation_submit', {
        eVar17: "contact_form_submission",
        eVar18: contextEmail,
        prop2: identity
      });
      
      document.getElementById('contactForm').style.display = 'none';
      document.getElementById('submissionSuccess').style.display = 'block';
    }
  </script>

</body>
</html>
